<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="big">
    <h1><span>Focus On </span>Today</h1>
    <div id="small">
        <h4>Today ☀️</h4><br>
        <p>Raise the bar by completing your progress.</p>
        <br>
        <div id="outer">
            <div id="inner"><p id="progress-text">2/3 completed</p></div>
        </div>
        <p id="warning">Please set the all three goal</p>
        <div class="taskbar" >
            <div  class="checkbox "></div>
            <input type="text" id =  "first" class="textt" placeholder="Add your task">
        </div>
        <div class="taskbar" >
            <div class="checkbox"></div>
            <input type="text" id =  "second" class="textt" placeholder="Add your task">
        </div>
        <div class="taskbar" >
            <div class="checkbox "></div>
            <input type="text" id =  "third" class="textt" placeholder="Add your task">
        </div>

        <p id="quotes">"Move One Step Ahead Today"</p>
        <p id="tag">Made With ❤️ By Shashi</p>
    </div>
</div>


    <script src="./index.js"></script>
</body>
</html>
